<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RPelago</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#141009" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RPelago" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet" />
  </head>
  <body>
    <script>
      (function () {
        var t = localStorage.getItem('realm_theme');
        if (t && t !== 'gilded') document.body.classList.add('theme-' + t);
        if (localStorage.getItem('realm_state_patterns') === 'true')
          document.documentElement.classList.add('state-patterns');
        if (localStorage.getItem('realm_show_labels') === 'false')
          document.documentElement.classList.add('no-tile-labels');
        if (localStorage.getItem('realm_highlight_advs') === 'true')
          document.documentElement.classList.add('highlight-my-advs');
        if (localStorage.getItem('realm_reduce_motion') === 'true')
          document.documentElement.classList.add('reduce-motion');
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
